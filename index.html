<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- add modal button -->
    <button class="btn" id="addHabitBtn">Add habit</button>

    <!-- Habit Add Modal -->

    <div class="modal-overlay">
      <!-- content / box of the modal  -->
      <div class="modal">
        <!-- modal heading -->
        <div class="modal-Heading">
          <div class="heading-content">
            <span> Set Your Goal </span>
            <div id="close-btn">&times;</div>
          </div>
        </div>

        <!-- main  section of modal  -->
        <div class="modal-Container">
          <input type="text" placeholder="Enter your task" autofocus />
          <input type="text" placeholder="Description" />
        </div>

        <div class="modal-Container">
          <span> Schedule </span>

          <!-- schedules-buttons -->
          <div class="Schedule-buttons">
            <button class="btns">Daily</button>
            <button class="btns">Weekly</button>
            <button class="btns">Custom</button>
          </div>

          <!-- days -->

          <div class="days-buttons">
            <button class="days-clicked-btn">SUN</button>
            <button class="days-btn">MON</button>
            <button class="days-btn">TUE</button>
            <button class="days-btn">SUN</button>
            <button class="days-btn">SUN</button>
            <button class="days-btn">SUN</button>
          </div>
        </div>

        <!-- Add Button  -->
        <div class="button">
          <button class="AddTask">Add task</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
